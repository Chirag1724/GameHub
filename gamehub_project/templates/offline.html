<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Offline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .box {
      max-width: 400px;
    }
    h1 {
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>You’re Offline</h1>
    <p>No internet connection detected.</p>
    <p>Please check your connection. This page will update automatically once you’re back online.</p>
  </div>
</body>
</html>
