{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Interface - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.24/dist/full.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link type="image/png" sizes="96x96" rel="icon" href="{% static 'assets/game-controller.png' %}">
    <script src="{% static 'scripts/audio-system.js' %}"></script>
    <script src="{% static 'scripts/audio-ui.js' %}"></script>
</head>

<body data-theme="dark" class="overflow-x-hidden">
    <!-- Navbar -->
    <div class="aurora-bg"></div>
    <div class="fixed inset-0 z-0 pointer-events-none opacity-40">
        <div
            class="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=&quot;60&quot; height=&quot;60&quot; viewBox=&quot;0 0 60 60&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot;%3E%3Cg fill=&quot;none&quot; fill-rule=&quot;evenodd&quot;%3E%3Cg fill=&quot;%239C92AC&quot; fill-opacity=&quot;0.05&quot;%3E%3Ccircle cx=&quot;30&quot; cy=&quot;30&quot; r=&quot;1&quot;/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')]">
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 glass-nav backdrop-blur-lg bg-black/20 border-b border-white/10">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center space-x-3 cursor-pointer group">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-cyan-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20 group-hover:scale-110 transition-transform">
                        <i class="fas fa-gamepad text-white text-lg"></i>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-orbitron font-black text-xl text-white tracking-widest leading-none">
                            GAME<span class="text-cyan-400">HUB</span>
                        </span>
                        <span
                            class="text-[10px] font-orbitron text-cyan-500/60 tracking-[0.3em] font-bold">PREMIUM</span>
                    </div>
                </a>

                <div class="hidden md:flex items-center space-x-8">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="Search modules..."
                            class="search-input pl-10 pr-4 py-2 rounded-full bg-white/5 border border-white/10 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500 w-64 transition-all" />
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                        <!-- Suggestions -->
                        <div id="searchSuggestions" class="search-suggestions"></div>
                    </div>
                    <a href="/leaderboard/" class="nav-link font-orbitron font-bold text-gray-300">Leaderboard</a>
                    <a href="/profile/" class="nav-link font-orbitron font-bold text-gray-300">Profile</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="pt-32 min-h-screen">
        <!-- Category Discovery Hub -->
        <section id="explore" class="relative py-20 section-active">
            <div class="container mx-auto px-4">
                <div class="text-center mb-20">
                    <h2 class="font-orbitron font-black text-4xl md:text-6xl text-white tracking-tighter">
                        CHOOSE YOUR <span class="text-cyan-400">SECTOR</span>
                    </h2>
                    <p class="font-rajdhani text-xl text-slate-400 mt-4 uppercase tracking-[0.4em]">Initialize
                        Connection</p>
                </div>
                <!-- Visual Category Hub -->
                <div id="categoryDiscovery" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                    <!-- Dynamically populated -->
                </div>
            </div>
        </section>

        <!-- Deep View: Games Section -->
        <section id="games" class="relative py-32 bg-slate-900/40 hidden border-t border-white/5">
            <div class="container mx-auto px-4">
                <div class="flex flex-col lg:flex-row justify-between items-end mb-20 gap-8">
                    <div>
                        <h2 class="font-orbitron font-black text-4xl md:text-5xl mb-4 text-white uppercase tracking-tighter"
                            id="currentCategoryTitle">
                            <span>Active Sector</span>
                        </h2>
                        <div class="flex items-center gap-4 text-cyan-400 uppercase tracking-widest text-xs font-bold">
                            <i class="fas fa-circle text-[6px] animate-pulse"></i> Linked & Synchronized
                        </div>
                    </div>

                    <div class="flex flex-wrap items-center gap-4">
                        <button onclick="showCategories()"
                            class="neon-button secondary px-8 py-3 text-xs uppercase font-black tracking-widest bg-cyan-500/10 border-cyan-500/30 text-cyan-400 hover:bg-cyan-500/20 transition-all">
                            <i class="fas fa-arrow-left mr-2"></i> Return to Hub
                        </button>
                    </div>
                </div>

                <div id="noResults" class="hidden text-center py-20">
                    <img src="https://cdn-icons-png.flaticon.com/512/6134/6134065.png"
                        class="w-32 h-32 mx-auto opacity-20 invert mb-8" />
                    <h3 class="font-orbitron text-2xl font-bold text-white mb-2 uppercase tracking-widest">No matching
                        modules found</h3>
                    <p class="font-rajdhani text-slate-500">The current sector contains no data matching your query.</p>
                </div>

                <!-- Category Filters (Mobile only or similar) -->
                <div id="categoryFilters" class="hidden"></div>

                <div id="gamesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10"></div>
            </div>
        </section>
    </main>

    <footer class="py-12 border-t border-white/5 text-center bg-black/50 backdrop-blur-md">
        <p class="font-orbitron text-[10px] text-slate-500 uppercase tracking-[0.5em]">GameHub Deployment v2.0.4-LTS</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{% static 'main.js' %}"></script>
</body>

</html>
